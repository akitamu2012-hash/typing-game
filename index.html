<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語タイピングゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="game-screen">
            <div id="sentence-kanji" class="kanji-display"></div>
            <div id="sentence-kana" class="kana-display"></div>
            <div id="romaji-display" class="romaji-display">
                <span id="typed-text" class="typed"></span><span id="untyped-text"></span>
            </div>
            <div class="progress">問題 <span id="current-index">1</span> / <span id="total-questions">0</span></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2>クリア！</h2>
            <button onclick="location.reload()">もう一度遊ぶ</button>
        </div>

        <div id="start-message">キーボードのどれかを押してスタート</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
