<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語タイピング練習</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- ゲーム画面 -->
    <div id="game-screen">
        <div id="sentence-kanji" class="kanji"></div>
        <div id="sentence-kana" class="kana"></div>

        <div class="romaji-box">
            <span id="typed"></span><span id="untyped"></span>
        </div>

        <div class="info">
            <span>ミス: <span id="miss">0</span></span>
        </div>
    </div>

    <!-- 結果画面（最初は隠しておく） -->
    <div id="result-screen" class="hidden">
        <h2>結果発表</h2>
        <div class="result-stats">
            <p id="time-result"></p>
            <p id="score-result"></p>
            <p id="miss-total"></p>
        </div>
        <button onclick="location.reload()" class="retry-btn">もう一度挑戦</button>
    </div>

    <!-- スタート案内 -->
    <div id="start-overlay">
        <p id="start-text">キーボードのどれかを押してスタート</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
